# Render 部署藍圖：在 Render Dashboard 選 New → Blueprint，指向這個 repo 即可
# 需要手動設定的環境變數（在 Render Dashboard 上填）：
#   DATABASE_URL   — Neon/Supabase 的 PostgreSQL 連線字串
#   （選填）EMAIL_HOST / EMAIL_HOST_USER / EMAIL_HOST_PASSWORD — SMTP 寄信服務
services:
  - type: web
    name: souler-api
    runtime: python
    plan: free
    region: singapore  # 必須與 Neon DB 同區，否則每個查詢都跨太平洋往返
    buildCommand: pip install -r requirements.txt && cd astro_project && python manage.py collectstatic --noinput
    startCommand: cd astro_project && python manage.py migrate && daphne -b 0.0.0.0 -p $PORT astro_project.asgi:application
    healthCheckPath: /api/v1/cities/
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: souler-api.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://souler-api.onrender.com
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: souler-redis
          property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        value: https://souler-web.onrender.com

  - type: keyvalue
    name: souler-redis
    plan: free
    region: singapore
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

  # 網頁版前端（Flutter Web 靜態站；建置時自行下載 Flutter SDK）
  - type: web
    name: souler-web
    runtime: static
    repo: https://github.com/Owenkuo3/souler_fe
    branch: main
    buildCommand: git clone --depth 1 -b stable https://github.com/flutter/flutter.git _flutter && ./_flutter/bin/flutter build web --release --dart-define=API_HOST=souler-api.onrender.com --dart-define=API_SECURE=true
    staticPublishPath: build/web
